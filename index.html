<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hawk!</title>

<style>
body{background:#111;color:white;font-family:Arial;text-align:center;padding:40px}
input {
    padding: 10px;
    width: 90%;
    max-width: 600px;
    min-height: 50px;
    font-size: 16px;
    word-wrap: break-word;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: white;
}
button{padding:10px 20px; margin-top:10px; cursor: pointer; border-radius: 5px; border: none; background: #444; color: white;}
button:hover{background: #666;}
#error{color:red;margin-top:20px; font-weight: bold;}
#success{color:lime;margin-top:20px; font-weight: bold;}
</style>
</head>

<body>

<h1>İmkansız Şifre Oyunu</h1>
<input type="text" id="password" placeholder="Şifreyi yaz..." autofocus>

<br>
<button onclick="kontrolEt()">Kontrol Et</button>
<p id="error"></p>
<p id="success"></p>

<script>
function asalMi(n){
    if(n<2) return false;
    for(let i=2;i<n;i++) if(n%i===0) return false;
    return true;
}

// ENTER TUŞU ÖZELLİĞİ BURADA
document.getElementById("password").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        kontrolEt();
    }
});

function kontrolEt(){
    let pw = document.getElementById("password").value;
    let error = document.getElementById("error");
    let success = document.getElementById("success");
    error.innerHTML = "";
    success.innerHTML = "";

    // 1. Temel Uzunluk ve Karakter Kontrolleri
    if (pw.length <5) { error.innerHTML = "Şifre en az 5 karakter olmalı."; return; }
    if (!/[A-Z]/.test(pw)) { error.innerHTML = "En az bir büyük harf olmalı."; return; }
    if (!/[a-z]/.test(pw)) { error.innerHTML = "En az bir küçük harf olmalı."; return; }
    if (!/[0-9]/.test(pw)) { error.innerHTML = "En az bir rakam olmalı."; return; }
    
    const ozelKarakterler = /[!"#$%&'()*+,-./:;<=>?@[\]^_`{|}~]/g;
    if (!ozelKarakterler.test(pw)) { error.innerHTML = "En az bir özel karakter içermeli."; return; }
    if ((pw.match(ozelKarakterler) || []).length < 3) { error.innerHTML = "En az 3 adet özel karakter olmalı."; return; }
    if (!pw.includes("!")) { error.innerHTML = "Mutlaka ünlem (!) içermeli."; return; }

    // 2. Coğrafya ve Uzay
    if (!pw.match(/türkiye|almanya|japonya|fransa|italya|rusya|ingiltere|amerika/i)) { error.innerHTML = "Geçerli bir ülke ismi içermeli."; return; }
    if (!pw.match(/adana|adıyaman|afyonkarahisar|ağrı|aksaray|amasya|ankara|antalya|ardahan|artvin|aydın|balıkesir|bilecik|bingöl|bitlis|bolu|burdur|bursa|çanakkale|çankırı|çorum|denizli|diyarbakır|düzce|edirne|elazığ|erzincan|erzurum|eskişehir|gaziantep|giresun|gümüşhane|hakkari|hatay|iğdır|isparta|istanbul|izmir|kahramanmaraş|karabük|karaman|kars|kastamonu|kayseri|kırıkkale|kırklareli|kırşehir|kocaeli|konya|kütahya|malatya|manisa|mardin|mersin|muğla|muş|nevşehir|niğde|ordu|osmaniye|rize|sakarya|samsun|siirt|sinop|sivas|şanlıurfa|şırnak|tekirdağ|tokat|trabzon|tunceli|uşak|van|yalova|yozgat|zonguldak/i)) { error.innerHTML = "Türkiye'den bir şehir ismi içermeli."; return; }
    if (!pw.match(/merkür|venüs|dünya|mars|jüpiter|satürn|uranüs|neptün/i)) { error.innerHTML = "Bir gezegen ismi içermeli."; return; }
    if (!pw.match(/ay|güneş|yıldız|bulut|karadelik/i)) { error.innerHTML = "Bir gök cismi içermeli."; return; }

    // 3. Zaman ve Takvim
    if (!pw.match(/pazartesi|salı|çarşamba|perşembe|cuma|cumartesi|pazar/i)) { error.innerHTML = "Bir hafta günü içermeli."; return; }
    if (!pw.match(/ocak|şubat|mart|nisan|mayıs|haziran|temmuz|ağustos|eylül|ekim|kasım|aralık/i)) { error.innerHTML = "12 aydan bir ay ismi içermeli."; return; }
    if (!pw.match(/19\d{2}|20\d{2}/)) { error.innerHTML = "Geçerli bir yıl içermeli."; return; }
    if (!pw.match(/([01]?[0-9]|2[0-3]):[0-5][0-9]/)) { error.innerHTML = "Saat formatı içermeli."; return; }

    // 4. Bilim ve Matematik
    if (!pw.match(/fe|na|o|h|he|li|be|c|n|ne|mg|al|si|p|s|cl|ar|k|ca/i)) { error.innerHTML = "Bir element sembolü içermeli."; return; }
    if (!pw.match(/[IVXLC]/)) { error.innerHTML = "Bir Roma rakamı içermeli."; return; }
    if (!pw.match(/2|3|5|7|11|13|17|19/)) { error.innerHTML = "Küçük bir asal sayı içermeli."; return; }
    if (!pw.includes("3.14")) { error.innerHTML = "Pi sayısı içermeli."; return; }
    if (!pw.match(/[√π∑+-x.∞∆]/)) { error.innerHTML = "Matematiksel bir sembol içermeli."; return; }
    
    let rakamlar = pw.match(/\d/g) || [];
    let toplam = rakamlar.reduce((a, b) => a + parseInt(b), 0);
    if (toplam <= 25) { error.innerHTML = "Şifredeki rakamların toplamı 25'ten büyük olmalı."; return; }

    // 5. Yazılım ve Tasarım
    if (!pw.match(/javascript|python|java|php|ruby|swift|html|css/i)) { error.innerHTML = "Bir programlama dili içermeli."; return; }

    // 6. Eğlence ve Kültür
    if (!pw.match(/😀|😂|😍|🔥|🚀|✨|😎|🤡|😭|😈|💀/)) { error.innerHTML = "Popüler bir emoji içermeli."; return; }
     if (!pw.match(/09.09.2009|/i)) { error.innerHTML = "arifinh doğum gününü içermeli (örn=xx.xx.xxxx)."; return; }
    if (!pw.match(/hilal|esin|lidya|mina|sueda|zoktay/i)) { error.innerHTML = "Manifest grubundan bir üye içermeli."; return; }
    if (!pw.match(/kral|vezir|piyon|kale|at|fil/i)) { error.innerHTML = "Bir satranç taşı içermeli."; return; }
    if (!pw.match(/futbol|basketbol|tenis|voleybol/i)) { error.innerHTML = "Bir spor dalı içermeli."; return; }
    if (!pw.match(/sucuk/i)) { error.innerHTML = "Şahinin lakabını (dükkan) içermelidir."; return; }

    // 7. Dil Bilgisi ve Mantık
    if (!pw.match(/[şçğıöüİĞÜŞÇÖ]/)) { error.innerHTML = "En az bir Türkçe karakter içermeli."; return; }

    // Başlangıç ve Bitiş Kuralları
    if (pw[0] !== pw[0].toUpperCase()) { error.innerHTML = "İlk harf büyük olmalı."; return; }
    if (!pw.endsWith("42")) { error.innerHTML = "42 ile bitmeli."; return; }
    if (pw.includes("  ")) { error.innerHTML = "Ardışık çift boşluk olmamalı."; return; }

    // BURAYI DÜZELTTİK: Eğer tüm şartlar geçerse bu çalışır
    success.innerHTML = "Helal olsun! Şifre kabul edildi.";
    error.innerHTML = "";
}
</script>
</body>

</html>
