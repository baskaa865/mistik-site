<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hawk! - Ultimate Chaos Edition</title>

<style>
body {
    background: #111;
    color: white;
    font-family: 'Courier New', Courier, monospace;
    text-align: center;
    padding: 40px;
    overflow-x: hidden;
    transition: background 0.5s;
}

/* Puan Sistemi */
#scoreBoard {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 24px;
    color: #0f0;
    text-shadow: 0 0 10px #0f0;
    z-index: 1000;
}

input {
    padding: 15px;
    width: 90%;
    max-width: 600px;
    min-height: 50px;
    font-size: 18px;
    word-wrap: break-word;
    border-radius: 8px;
    border: 2px solid #444;
    background: #222;
    color: white;
    transition: all 0.3s;
    position: relative;
    z-index: 10;
}

input:focus {
    border-color: #00ffcc;
    box-shadow: 0 0 20px #00ffcc;
    outline: none;
}

#btnContainer { height: 80px; margin-top: 20px; position: relative; }
button {
    padding: 12px 25px; 
    cursor: pointer; 
    border-radius: 5px; 
    border: none; 
    background: #00ffcc; 
    color: #111;
    font-weight: bold;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: all 0.1s ease;
    z-index: 100;
}

/* Garip Şeyler İçin Animasyonlar */
.chaos-element {
    position: fixed;
    pointer-events: none;
    font-size: 30px;
    z-index: 5;
    animation: floatChaos 3s linear forwards;
}

@keyframes floatChaos {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--mx), var(--my)) rotate(360deg) scale(0); opacity: 0; }
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-8px) rotate(-2deg); }
    50% { transform: translateX(8px) rotate(2deg); }
    75% { transform: translateX(-8px); }
    100% { transform: translateX(0); }
}

.shake-it { animation: shake 0.2s 3; }
#error { color: #ff4444; margin-top: 20px; font-weight: bold; min-height: 25px; font-size: 1.2rem; }
#success { color: #00ff00; margin-top: 20px; font-weight: bold; text-shadow: 0 0 20px #00ff00; }
</style>
</head>

<body>

<div id="scoreBoard">SKOR: <span id="score">0</span></div>

<h1>ŞİFRE OLUŞTUR (KAOS MODU)</h1>
<input type="text" id="password" placeholder="Şifreni buraya kazı..." autofocus>

<div id="btnContainer">
    <button id="checkBtn" onclick="kontrolEt()" onmouseover="kacBenden()">Kontrol Et</button>
</div>

<p id="error"></p>
<p id="success"></p>

<script>
let score = 0;
const emojiler = ["💀", "👽", "🍄", "🌀", "💾", "⚡", "🌈", "🤡", "👁️", "🩸", "🧊"];

function kacBenden() {
    let errorText = document.getElementById("error").innerHTML;
    if (errorText !== "" || document.getElementById("success").innerHTML === "") {
        let btn = document.getElementById("checkBtn");
        let x = Math.random() * (window.innerWidth - 150) - (window.innerWidth / 2) + 75;
        let y = Math.random() * 100 - 50; 
        btn.style.left = `calc(50% + ${x}px)`;
        btn.style.top = `${y}px`;
    }
}

function kaosYarat(miktar) {
    for(let i=0; i<miktar; i++) {
        const el = document.createElement("div");
        el.className = "chaos-element";
        el.innerHTML = emojiler[Math.floor(Math.random() * emojiler.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = Math.random() * 100 + "vh";
        el.style.setProperty('--mx', (Math.random() - 0.5) * 400 + "px");
        el.style.setProperty('--my', (Math.random() - 0.5) * 400 + "px");
        el.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
    // Arkaplanı anlık değiştir
    document.body.style.background = `rgb(${Math.random()*50}, ${Math.random()*20}, ${Math.random()*50})`;
    setTimeout(() => document.body.style.background = "#111", 200);
}

function kontrolEt() {
    let pw = document.getElementById("password").value;
    let error = document.getElementById("error");
    let success = document.getElementById("success");
    let inputField = document.getElementById("password");
    let currentScore = 0;
    
    error.innerHTML = "";
    success.innerHTML = "";
    error.classList.remove("shake-it");
    inputField.classList.remove("shake-it");

    function hataVer(mesaj) {
        error.innerHTML = mesaj;
        void error.offsetWidth; 
        error.classList.add("shake-it");
        inputField.classList.add("shake-it");
        guncelleSkor(currentScore);
        return false;
    }

    function guncelleSkor(s) {
        score = s * 10;
        document.getElementById("score").innerHTML = score;
        if(s > 0) kaosYarat(s);
    }

    // --- KURALLAR ---
    if (pw.length < 5) return hataVer("Şifre en az 5 karakter olmalı."); currentScore++;
    if (!/[A-Z]/.test(pw)) return hataVer("En az bir büyük harf olmalı."); currentScore++;
    if (!/[a-z]/.test(pw)) return hataVer("En az bir küçük harf olmalı."); currentScore++;
    if (!/[0-9]/.test(pw)) return hataVer("En az bir rakam olmalı."); currentScore++;
    
    const ozelKarakterler = /[!"#$%&'()*+,-./:;<=>?@[\]^_`{|}~]/g;
    if (!ozelKarakterler.test(pw)) return hataVer("En az bir özel karakter içermeli."); currentScore++;
    if ((pw.match(ozelKarakterler) || []).length < 3) return hataVer("En az 3 adet özel karakter olmalı."); currentScore++;
    if (!pw.includes("!")) return hataVer("Mutlaka ünlem (!) içermeli."); currentScore++;

    if (!pw.match(/türkiye|almanya|japonya|fransa|italya|rusya|ingiltere|amerika/i)) return hataVer("Geçerli bir ülke ismi içermeli."); currentScore++;
    if (!pw.match(/ankara|istanbul|izmir|adana|antalya|bursa|konya|balıkesir/i)) return hataVer("Büyük bir Türk şehri ismi içermeli."); currentScore++;
    if (!pw.match(/merkür|venüs|dünya|mars|jüpiter|satürn|uranüs|neptün/i)) return hataVer("Bir gezegen ismi içermeli."); currentScore++;
    if (!pw.match(/ay|güneş|yıldız|bulut|karadelik/i)) return hataVer("Bir gök cismi içermeli."); currentScore++;

    if (!pw.match(/pazartesi|salı|çarşamba|perşembe|cuma|cumartesi|pazar/i)) return hataVer("Bir hafta günü içermeli."); currentScore++;
    if (!pw.match(/ocak|şubat|mart|nisan|mayıs|haziran|temmuz|ağustos|eylül|ekim|kasım|aralık/i)) return hataVer("Bir ay ismi içermeli."); currentScore++;
    if (!pw.match(/19\d{2}|20\d{2}/)) return hataVer("Geçerli bir yıl (19XX-20XX) içermeli."); currentScore++;
    if (!pw.match(/([01]?[0-9]|2[0-3]):[0-5][0-9]/)) return hataVer("Saat formatı (14:53) içermeli."); currentScore++;

    if (!pw.match(/fe|na|o|h|he|li|be|c|n|ne|mg|al|si|p|s|cl|ar|k|ca/i)) return hataVer("Bir element sembolü içermeli."); currentScore++;
    if (!pw.match(/[IVXLC]/)) return hataVer("Bir Roma rakamı içermeli."); currentScore++;
    if (!pw.match(/2|3|5|7|11|13|17|19/)) return hataVer("Küçük bir asal sayı içermeli."); currentScore++;
    if (!pw.includes("3.14")) return hataVer("Pi sayısı (3.14) içermeli."); currentScore++;
    if (!pw.match(/[√π∑+-x.∞∆]/)) return hataVer("Matematiksel bir sembol içermeli."); currentScore++;
    
    let rakamlar = pw.match(/\d/g) || [];
    let toplam = rakamlar.reduce((a, b) => a + parseInt(b), 0);
    if (toplam <= 25) return hataVer("Rakamların toplamı 25'ten büyük olmalı (Şu an: "+toplam+")."); currentScore++;

    if (!pw.match(/javascript|python|java|php|ruby|swift|html|css/i)) return hataVer("Programlama dili içermeli."); currentScore++;
    if (!pw.match(/😀|😂|😍|🔥|🚀|✨|😎|🤡|😭|😈|💀/)) return hataVer("Popüler bir emoji içermeli."); currentScore++;
    if (!pw.match(/09.09.2009/)) return hataVer("Arifin doğum gününü içermeli (09.09.2009)."); currentScore++;
    if (!pw.match(/hilal|esin|lidya|mina|sueda|zoktay/i)) return hataVer("Manifest grubundan bir üye içermeli."); currentScore++;
    if (!pw.match(/kral|vezir|piyon|kale|at|fil/i)) return hataVer("Satranç taşı içermeli."); currentScore++;
    if (!pw.match(/sucuk/i)) return hataVer("Şahinin lakabını (sucuk) içermeli."); currentScore++;
    if (!pw.match(/[şçğıöüİĞÜŞÇÖ]/)) return hataVer("Türkçe karakter içermeli."); currentScore++;

    if (pw[0] !== pw[0].toUpperCase()) return hataVer("İlk harf büyük olmalı."); currentScore++;
    if (!pw.endsWith("42")) return hataVer("Evrenin cevabı (42) ile bitmeli."); currentScore++;

    // Başarılı
    guncelleSkor(currentScore + 5);
    success.innerHTML = "KAOSUN EFENDİSİ OLDUN! Şifre Kabul Edildi.";
    error.innerHTML = "";
    let btn = document.getElementById("checkBtn");
    btn.style.left = "50%";
    btn.style.top = "0";
    confettiRain();
}

function confettiRain() {
    for(let i=0; i<100; i++) {
        setTimeout(() => kaosYarat(1), i * 20);
    }
}

document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") { e.preventDefault(); kontrolEt(); }
});
</script>
</body>
</html>
