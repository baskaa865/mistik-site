<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hawk!</title>

<style>
body{background:#111;color:white;font-family:Arial;text-align:center;padding:40px}
input {
    padding: 10px;
    width: 90%;
    max-width: 600px;
    min-height: 50px;
    font-size: 16px;
    word-wrap: break-word;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: white;
}
button{padding:10px 20px; margin-top:10px; cursor: pointer; border-radius: 5px; border: none; background: #444; color: white;}
button:hover{background: #666;}
#error{color:red;margin-top:20px; font-weight: bold;}
#success{color:lime;margin-top:20px; font-weight: bold;}
</style>
</head>

<body>

<h1>Д°mkansДұz Еһifre Oyunu</h1>
<input type="text" id="password" placeholder="Еһifreyi yaz..." autofocus>

<br>
<button onclick="kontrolEt()">Kontrol Et</button>
<p id="error"></p>
<p id="success"></p>

<script>
function asalMi(n){
    if(n<2) return false;
    for(let i=2;i<n;i++) if(n%i===0) return false;
    return true;
}

// ENTER TUЕһU Г–ZELLД°ДһД° BURADA
document.getElementById("password").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        kontrolEt();
    }
});

function kontrolEt(){
    let pw = document.getElementById("password").value;
    let error = document.getElementById("error");
    let success = document.getElementById("success");
    error.innerHTML = "";
    success.innerHTML = "";

    // 1. Temel Uzunluk ve Karakter Kontrolleri
    if (pw.length < 5) { error.innerHTML = "Еһifre en az 5 karakter olmalДұ."; return; }
    if (!/[A-Z]/.test(pw)) { error.innerHTML = "En az bir bГјyГјk harf olmalДұ."; return; }
    if (!/[a-z]/.test(pw)) { error.innerHTML = "En az bir kГјГ§Гјk harf olmalДұ."; return; }
    if (!/[0-9]/.test(pw)) { error.innerHTML = "En az bir rakam olmalДұ."; return; }
    
    const ozelKarakterler = /[!"#$%&'()*+,-./:;<=>?@[\]^_`{|}~]/g;
    if (!ozelKarakterler.test(pw)) { error.innerHTML = "En az bir Г¶zel karakter iГ§ermeli."; return; }
    if ((pw.match(ozelKarakterler) || []).length < 3) { error.innerHTML = "En az 3 adet Г¶zel karakter olmalДұ."; return; }
    if (!pw.includes("!")) { error.innerHTML = "Mutlaka Гјnlem (!) iГ§ermeli."; return; }

    // 2. CoДҹrafya ve Uzay
    if (!pw.match(/tГјrkiye|almanya|japonya|fransa|italya|rusya|ingiltere|amerika/i)) { error.innerHTML = "GeГ§erli bir Гјlke ismi iГ§ermeli."; return; }
    if (!pw.match(/adana|adДұyaman|afyonkarahisar|aДҹrДұ|aksaray|amasya|ankara|antalya|ardahan|artvin|aydДұn|balДұkesir|bilecik|bingГ¶l|bitlis|bolu|burdur|bursa|Г§anakkale|Г§ankДұrДұ|Г§orum|denizli|diyarbakДұr|dГјzce|edirne|elazДұДҹ|erzincan|erzurum|eskiЕҹehir|gaziantep|giresun|gГјmГјЕҹhane|hakkari|hatay|iДҹdДұr|isparta|istanbul|izmir|kahramanmaraЕҹ|karabГјk|karaman|kars|kastamonu|kayseri|kДұrДұkkale|kДұrklareli|kДұrЕҹehir|kocaeli|konya|kГјtahya|malatya|manisa|mardin|mersin|muДҹla|muЕҹ|nevЕҹehir|niДҹde|ordu|osmaniye|rize|sakarya|samsun|siirt|sinop|sivas|ЕҹanlДұurfa|ЕҹДұrnak|tekirdaДҹ|tokat|trabzon|tunceli|uЕҹak|van|yalova|yozgat|zonguldak/i)) { error.innerHTML = "TГјrkiye'den bir Еҹehir ismi iГ§ermeli."; return; }
    if (!pw.match(/merkГјr|venГјs|dГјnya|mars|jГјpiter|satГјrn|uranГјs|neptГјn/i)) { error.innerHTML = "Bir gezegen ismi iГ§ermeli."; return; }
    if (!pw.match(/ay|gГјneЕҹ|yДұldДұz|bulut|karadelik/i)) { error.innerHTML = "Bir gГ¶k cismi iГ§ermeli."; return; }

    // 3. Zaman ve Takvim
    if (!pw.match(/pazartesi|salДұ|Г§arЕҹamba|perЕҹembe|cuma|cumartesi|pazar/i)) { error.innerHTML = "Bir hafta gГјnГј iГ§ermeli."; return; }
    if (!pw.match(/ocak|Еҹubat|mart|nisan|mayДұs|haziran|temmuz|aДҹustos|eylГјl|ekim|kasДұm|aralДұk/i)) { error.innerHTML = "12 aydan bir ay ismi iГ§ermeli."; return; }
    if (!pw.match(/19\d{2}|20\d{2}/)) { error.innerHTML = "GeГ§erli bir yДұl iГ§ermeli."; return; }
    if (!pw.match(/([01]?[0-9]|2[0-3]):[0-5][0-9]/)) { error.innerHTML = "Saat formatДұ iГ§ermeli."; return; }

    // 4. Bilim ve Matematik
    if (!pw.match(/fe|na|o|h|he|li|be|c|n|ne|mg|al|si|p|s|cl|ar|k|ca/i)) { error.innerHTML = "Bir element sembolГј iГ§ermeli."; return; }
    if (!pw.match(/[IVXLC]/)) { error.innerHTML = "Bir Roma rakamДұ iГ§ermeli."; return; }
    if (!pw.match(/2|3|5|7|11|13|17|19/)) { error.innerHTML = "KГјГ§Гјk bir asal sayДұ iГ§ermeli."; return; }
    if (!pw.includes("3.14")) { error.innerHTML = "Pi sayДұsДұ iГ§ermeli."; return; }
    if (!pw.match(/[вҲҡПҖвҲ‘+-x.вҲһвҲҶ]/)) { error.innerHTML = "Matematiksel bir sembol iГ§ermeli."; return; }
    
    let rakamlar = pw.match(/\d/g) || [];
    let toplam = rakamlar.reduce((a, b) => a + parseInt(b), 0);
    if (toplam <= 25) { error.innerHTML = "Еһifredeki rakamlarДұn toplamДұ 25'ten bГјyГјk olmalДұ."; return; }

    // 5. YazДұlДұm ve TasarДұm
    if (!pw.match(/javascript|python|java|php|ruby|swift|html|css/i)) { error.innerHTML = "Bir programlama dili iГ§ermeli."; return; }

    // 6. EДҹlence ve KГјltГјr
    if (!pw.match(/рҹҳҖ|рҹҳӮ|рҹҳҚ|рҹ”Ҙ|рҹҡҖ|вңЁ|рҹҳҺ|рҹӨЎ|рҹҳҲ|рҹ’Җ/)) { error.innerHTML = "PopГјler bir emoji iГ§ermeli."; return; }
    if (!pw.match(/hilal|esin|lidya|mina|sueda|zoktay/i)) { error.innerHTML = "Manifest grubundan bir Гјye iГ§ermeli."; return; }
    if (!pw.match(/kral|vezir|piyon|kale|at|fil/i)) { error.innerHTML = "Bir satranГ§ taЕҹДұ iГ§ermeli."; return; }
    if (!pw.match(/futbol|basketbol|tenis|voleybol/i)) { error.innerHTML = "Bir spor dalДұ iГ§ermeli."; return; }
    if (!pw.match(/sucuk/i)) { error.innerHTML = "Еһahinin lakabДұnДұ (dГјkkan) iГ§ermelidir."; return; }

    // 7. Dil Bilgisi ve MantДұk
    if (!pw.match(/[ЕҹГ§ДҹДұГ¶ГјД°ДһГңЕһГҮГ–]/)) { error.innerHTML = "En az bir TГјrkГ§e karakter iГ§ermeli."; return; }

    // BaЕҹlangДұГ§ ve BitiЕҹ KurallarДұ
    if (pw[0] !== pw[0].toUpperCase()) { error.innerHTML = "Д°lk harf bГјyГјk olmalДұ."; return; }
    if (!pw.endsWith("42")) { error.innerHTML = "42 ile bitmeli."; return; }
    if (pw.includes("  ")) { error.innerHTML = "ArdДұЕҹДұk Г§ift boЕҹluk olmamalДұ."; return; }

    // BURAYI DГңZELTTД°K: EДҹer tГјm Еҹartlar geГ§erse bu Г§alДұЕҹДұr
    success.innerHTML = "Helal olsun! Еһifre kabul edildi.";
    error.innerHTML = "";
}
</script>
